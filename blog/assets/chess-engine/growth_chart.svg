<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg">
  <!-- horizontal grid + y labels (log scale, powers of 10) -->
  <g stroke="rgba(255,255,255,.08)" stroke-width="1">
    <line x1="60" y1="340.0" x2="690" y2="340.0"/>
    <line x1="60" y1="294.3" x2="690" y2="294.3"/>
    <line x1="60" y1="248.6" x2="690" y2="248.6"/>
    <line x1="60" y1="202.9" x2="690" y2="202.9"/>
    <line x1="60" y1="157.1" x2="690" y2="157.1"/>
    <line x1="60" y1="111.4" x2="690" y2="111.4"/>
    <line x1="60" y1="65.7"  x2="690" y2="65.7"/>
    <line x1="60" y1="20.0"  x2="690" y2="20.0"/>
  </g>
  <g fill="#94a3b8" font-size="12" font-family="Consolas, monospace" text-anchor="end">
    <text x="52" y="344">1</text>
    <text x="52" y="298.3">10</text>
    <text x="52" y="252.6">100</text>
    <text x="52" y="206.9">1K</text>
    <text x="52" y="161.1">10K</text>
    <text x="52" y="115.4">100K</text>
    <text x="52" y="69.7">1M</text>
    <text x="52" y="24">10M</text>
  </g>

  <!-- x axis labels (search depth in plies) -->
  <g fill="#94a3b8" font-size="13" font-family="Consolas, monospace" text-anchor="middle">
    <text x="60"    y="365">1</text>
    <text x="217.5" y="365">2</text>
    <text x="375"   y="365">3</text>
    <text x="532.5" y="365">4</text>
    <text x="690"   y="365">5</text>
  </g>
  <text x="375" y="379" fill="#64748b" font-size="12" font-family="Consolas, monospace" text-anchor="middle">search depth (plies)</text>

  <!-- naive full-tree series -->
  <polyline points="60.0,279.6 217.5,220.0 375.0,158.5 532.5,97.0 690.0,33.5"
            fill="none" stroke="#f97316" stroke-width="2.5"/>
  <g fill="#f97316">
    <circle cx="60.0"  cy="279.6" r="4"/>
    <circle cx="217.5" cy="220.0" r="4"/>
    <circle cx="375.0" cy="158.5" r="4"/>
    <circle cx="532.5" cy="97.0"  r="4"/>
    <circle cx="690.0" cy="33.5"  r="4"/>
  </g>
  <g fill="#fdba74" font-size="11.5" font-family="Consolas, monospace">
    <text x="65"    y="273">21</text>
    <text x="222.5" y="213">421</text>
    <text x="380"   y="151.5">9,323</text>
    <text x="480"   y="90">206,604</text>
    <text x="565"   y="30">5,072,213</text>
  </g>

  <!-- alpha-beta pruned series -->
  <polyline points="60.0,280.5 217.5,248.0 375.0,205.4 532.5,175.4 690.0,129.6"
            fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <g fill="#22d3ee">
    <circle cx="60.0"  cy="280.5" r="4"/>
    <circle cx="217.5" cy="248.0" r="4"/>
    <circle cx="375.0" cy="205.4" r="4"/>
    <circle cx="532.5" cy="175.4" r="4"/>
    <circle cx="690.0" cy="129.6" r="4"/>
  </g>
  <g fill="#67e8f9" font-size="11.5" font-family="Consolas, monospace">
    <text x="65"    y="298">20</text>
    <text x="222.5" y="266">103</text>
    <text x="380"   y="223">879</text>
    <text x="537.5" y="193">3,987</text>
    <text x="600"   y="147">40,114</text>
  </g>

  <!-- legend -->
  <g font-family="Consolas, monospace" font-size="13">
    <circle cx="270" cy="15" r="4" fill="#f97316"/>
    <text x="280" y="19" fill="#e2e8f0">unpruned minimax</text>
    <circle cx="470" cy="15" r="4" fill="#22d3ee"/>
    <text x="480" y="19" fill="#e2e8f0">alpha-beta pruned</text>
  </g>
</svg>
