<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <!-- edges -->
  <g stroke="rgba(255,255,255,.25)" stroke-width="2">
    <line x1="350" y1="55" x2="175" y2="150"/>
    <line x1="350" y1="55" x2="525" y2="150"/>
    <line x1="175" y1="165" x2="90"  y2="255"/>
    <line x1="175" y1="165" x2="260" y2="255"/>
    <line x1="525" y1="165" x2="440" y2="255"/>
    <line x1="525" y1="165" x2="610" y2="255"/>
  </g>
  <!-- highlighted best-line path: root -> A -> A1 -->
  <g stroke="#22d3ee" stroke-width="3.5">
    <line x1="350" y1="55" x2="175" y2="150"/>
    <line x1="175" y1="165" x2="90" y2="255"/>
  </g>

  <!-- root: MAX node (White to move) -->
  <circle cx="350" cy="40" r="26" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
  <text x="350" y="46" text-anchor="middle" fill="white" font-size="18" font-weight="700" font-family="Consolas, monospace">3</text>
  <text x="410" y="30" fill="#93c5fd" font-size="13" font-family="Consolas, monospace">MAX (White to move)</text>

  <!-- level 1: MIN nodes (Black to move) -->
  <circle cx="175" cy="150" r="24" fill="#6d28d9" stroke="#c4b5fd" stroke-width="2"/>
  <text x="175" y="156" text-anchor="middle" fill="white" font-size="17" font-weight="700" font-family="Consolas, monospace">3</text>

  <circle cx="525" cy="150" r="24" fill="#6d28d9" stroke="#c4b5fd" stroke-width="2"/>
  <text x="525" y="156" text-anchor="middle" fill="white" font-size="17" font-weight="700" font-family="Consolas, monospace">-2</text>

  <text x="10" y="146" fill="#c4b5fd" font-size="13" font-family="Consolas, monospace">MIN (Black to move)</text>

  <!-- leaves: static evaluation -->
  <g font-family="Consolas, monospace">
    <rect x="70"  y="255" width="40" height="34" rx="6" fill="#0d1424" stroke="#22d3ee" stroke-width="2"/>
    <text x="90"  y="277" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">+3</text>

    <rect x="240" y="255" width="40" height="34" rx="6" fill="#0d1424" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
    <text x="260" y="277" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">+5</text>

    <rect x="420" y="255" width="40" height="34" rx="6" fill="#0d1424" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
    <text x="440" y="277" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">-2</text>

    <rect x="590" y="255" width="40" height="34" rx="6" fill="#0d1424" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
    <text x="610" y="277" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">+1</text>
  </g>

  <text x="350" y="312" text-anchor="middle" fill="#64748b" font-size="12.5" font-family="Consolas, monospace">leaves = evaluate(board) at the search horizon</text>
</svg>
